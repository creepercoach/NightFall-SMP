<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>NightFall SMP Gallery</title>
    <link rel="stylesheet" href="style.css?v=14">
</head>
<body>

<div class="loader" id="loader" aria-hidden="true">
  <div class="loader-mark">NF</div>
  <div class="loader-bar"></div>
</div>

<div class="night-particles" aria-hidden="true">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>

<nav class="site-nav">
  <a href="index.html" class="nav-brand">NightFall</a>
  <button class="nav-toggle" aria-label="Open navigation" aria-expanded="false" onclick="toggleNav(this)">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <div class="nav-links" id="nav-links">
    <a href="index.html">Home</a>
    <a href="rules.html">Rules</a>
    <a href="gallery.html">Gallery</a>
    <a href="staff.html">Staff</a>
    <a href="index.html#join">Join</a>
    <a href="index.html#discord">Discord</a>
    <a href="index.html#faq">FAQ</a>
    <a href="index.html#info">Info</a>
  </div>
  <button class="theme-toggle" type="button" onclick="toggleTheme(this)" aria-label="Switch to light theme">Light mode</button>
</nav>

<div class="container">

<h1>Gallery</h1>

<div class="gallery-hero">
    <p class="eyebrow">NightFall SMP</p>
    <h2>Server Gallery</h2>
    <p>Snowy spawn views, warm lantern paths, and quiet survival atmosphere from around the server.</p>
</div>

<div class="gallery-grid">
    <a class="gallery-card featured" href="gallery/snowy-spawn-wide.png" target="_blank">
        <img src="gallery/snowy-spawn-wide.png" alt="Wide snowy spawn view">
        <span>Snowy Spawn</span>
    </a>

    <a class="gallery-card" href="gallery/spawn-path.png" target="_blank">
        <img src="gallery/spawn-path.png" alt="Snowy spawn path with lanterns">
        <span>Lantern Path</span>
    </a>

    <a class="gallery-card" href="gallery/spawn-interior.png" target="_blank">
        <img src="gallery/spawn-interior.png" alt="Inside the spawn structure looking outward">
        <span>Spawn Interior</span>
    </a>
</div>

<a href="index.html" class="button">Back to Home</a>

</div>

<script>
window.addEventListener("load", function () {
    var loader = document.getElementById("loader");
    if (loader) {
        loader.classList.add("loaded");
    }
});

function toggleNav(button) {
    var navLinks = document.getElementById("nav-links");
    var isOpen = navLinks.classList.toggle("open");
    button.classList.toggle("open", isOpen);
    button.setAttribute("aria-expanded", isOpen);
}

function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("nightfall-theme", theme);

    document.querySelectorAll(".theme-toggle").forEach(function (button) {
        var isLight = theme === "light";
        button.textContent = isLight ? "Dark mode" : "Light mode";
        button.setAttribute("aria-label", isLight ? "Switch to dark theme" : "Switch to light theme");
    });
}

function toggleTheme() {
    var currentTheme = document.documentElement.getAttribute("data-theme") || "dark";
    applyTheme(currentTheme === "dark" ? "light" : "dark");
}

applyTheme(localStorage.getItem("nightfall-theme") || "dark");
</script>

</body>
</html>
