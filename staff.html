<div class="container">

<h1>Staff</h1>

<div class="staff-hero">
    <p class="eyebrow">NightFall SMP</p>
    <h2>Meet the Staff</h2>
    <p>The people helping keep NightFall SMP active, fair, and fun.</p>
</div>

<div class="staff-grid" id="staff-grid"></div>

<a href="index.html" class="button">Back to Home</a>

</div>

<script>
window.addEventListener("load", function () {
    var loader = document.getElementById("loader");
    if (loader) {
        loader.classList.add("loaded");
    }
});

var staffMembers = [
    {
        name: "creepercoach",
        role: "Owner",
        uuid: "fc4127ff-9123-4027-9355-78eea9be346a",
        discordId: "1439751819508191394"
    },
    {
        name: "trickster3121",
        role: "Developer",
        uuid: "4aaf69f3-0829-496f-936b-9505e3539d3f",
        discordId: "1041228517939097620"
    },
    {
        name: "dork_slayer",
        role: "Developer",
        uuid: "ce3a4dba-5872-43b8-9927-57354e63a0aa",
        discordId: "1500129789330198669"
    },
    {
        name: "YiyangTheKid2013",
        role: "Moderator",
        uuid: "",
        discordId: "1498848752897888316"
    },
    {
        name: "Ace",
        role: "Moderator",
        uuid: "",
        discordId: "1382438608677634102"
    }
];

function buildStaffCards() {
    var staffGrid = document.getElementById("staff-grid");

    staffMembers.forEach(function (member) {
        var card = document.createElement("article");
        card.className = "staff-card";

        var heading = document.createElement("div");
        heading.className = "staff-card-heading";

        var name = document.createElement("h2");
        name.textContent = member.name;

        var role = document.createElement("p");
        role.textContent = member.role;

        heading.appendChild(name);
        heading.appendChild(role);
        card.appendChild(heading);

        if (member.uuid) {
            var iframe = document.createElement("iframe");
            iframe.title = member.name + " Minecraft skin";
            iframe.src = "https://laby.net/embed#uuid=" + member.uuid + "&no_buttons&rotate&zoom&pan";
            iframe.width = "300";
            iframe.height = "400";
            iframe.frameBorder = "0";
            iframe.allowTransparency = "true";
            iframe.loading = "lazy";
            card.appendChild(iframe);
        } else {
            var placeholder = document.createElement("div");
            placeholder.className = "staff-placeholder";
            placeholder.innerHTML = "<span>NF</span><p>Minecraft embed coming soon</p>";
            card.appendChild(placeholder);
        }

        var discord = document.createElement("div");
        discord.className = "staff-discord";

        var discordLabel = document.createElement("span");
        discordLabel.textContent = "Discord";

        var discordValue = document.createElement("a");
        discordValue.href = "https://discord.com/users/" + member.discordId;
        discordValue.target = "_blank";
        discordValue.rel = "noopener";
        discordValue.textContent = "View Discord Profile";

        discord.appendChild(discordLabel);
        discord.appendChild(discordValue);
        card.appendChild(discord);
        staffGrid.appendChild(card);
    });
}

function toggleNav(button) {
    var navLinks = document.getElementById("nav-links");
    var isOpen = navLinks.classList.toggle("open");
    button.classList.toggle("open", isOpen);
    button.setAttribute("aria-expanded", isOpen);
}

function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("nightfall-theme", theme);

    document.querySelectorAll(".theme-toggle").forEach(function (button) {
        var isLight = theme === "light";
        button.textContent = isLight ? "Dark mode" : "Light mode";
        button.setAttribute("aria-label", isLight ? "Switch to dark theme" : "Switch to light theme");
    });
}

function toggleTheme() {
    var currentTheme = document.documentElement.getAttribute("data-theme") || "dark";
    applyTheme(currentTheme === "dark" ? "light" : "dark");
}

applyTheme(localStorage.getItem("nightfall-theme") || "dark");
buildStaffCards();
</script>

</body>
</html>
